{% set name = "dynapydantic" %}
{% set version = "0.4.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dynapydantic-{{ version }}.tar.gz
  sha256: b6de96a4502021da7149f6ca22cb3d901b1e302add2e32b8c800c18ec985ac9b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - pydantic >=2.0

test:
  imports:
    - dynapydantic
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: Dyanmic pydantic models
  home: https://github.com/psalvaggio/dynapydantic
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - psalvaggio
